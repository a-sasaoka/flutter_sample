# GitHub Actionsのワークフロー名。Actionsタブでこの名前が表示されます。
name: Flutter CI

# 実行トリガーの設定
on:
  pull_request:
    # mainブランチへ向けたPull Requestが対象
    branches: [main]
    # PR作成時、追記プッシュ時、再オープン時に実行
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  # テストを実行するメインのジョブ
  test:
    # クラウド上の最新Ubuntu環境で実行
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. ソースコードを取得
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. .fvmrc から Flutter バージョンを取得
      #    例: "flutter": "3.24.0" から "3.24.0" を抽出します
      - name: Get Flutter version from FVM
        id: fvm-config
        run: |
          FLUTTER_VERSION=$(grep '"flutter":' .fvmrc | cut -d'"' -f4)
          echo "FLUTTER_VERSION=$FLUTTER_VERSION" >> $GITHUB_OUTPUT

      # 3. 指定したバージョンの Flutter SDK をインストール
      #    cache: true により、パッケージ等のキャッシュを有効化して高速化します
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config.outputs.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      # 4. 依存パッケージ（Riverpod, Freezed等）のインストール
      - name: Install dependencies
        run: flutter pub get

      # 4.4. ダミーの環境変数ファイルを作成する（envied_generatorのエラー回避）
      - name: Create dummy .env.local
        run: |
          echo "FLAVOR=local" > .env.local
          echo "APP_NAME=example local" >> .env.local
          echo "APP_ID=example.local" >> .env.local
          echo "BASE_URL=https://jsonplaceholder.typicode.com" >> .env.local
          echo "CONNECT_TIMEOUT=10" >> .env.local
          echo "RECEIVE_TIMEOUT=15" >> .env.local
          echo "SEND_TIMEOUT=10" >> .env.local
          echo "USE_FIREBASE_AUTH=true" >> .env.local
          echo "GOOGLE_REVERSED_CLIENT_ID=example" >> .env.local
          echo "DEBUG_TOKEN=example" >> .env.local
          echo "AI_MODEL=gemini-2.5-flash" >> .env.local

      # 4.5. ダミーのFirebase設定ファイルを作成する（静的解析エラー回避）
      - name: Create dummy Firebase options
        run: |
          cat << 'EOF' > dummy_firebase.dart
          // ignore_for_file: type=lint
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform => const FirebaseOptions(
              apiKey: 'dummy',
              appId: 'dummy',
              messagingSenderId: 'dummy',
              projectId: 'dummy'
            );
          }
          EOF
          cp dummy_firebase.dart lib/firebase_options_dev.dart
          cp dummy_firebase.dart lib/firebase_options_local.dart
          cp dummy_firebase.dart lib/firebase_options_prod.dart
          cp dummy_firebase.dart lib/firebase_options_stg.dart
          rm dummy_firebase.dart
          # 後続の整形チェックで引っかからないように、生成したファイルをあらかじめ整形しておく
          dart format lib/firebase_options_*.dart

      # 4.6. build_runnerで自動生成コード（Riverpod, Freezed, Envied等）を生成する
      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs --define "envied_generator:envied=path=.env.local"

      # 5. コードの整形チェック
      #    整形が正しくない場合、ここで失敗させてコードの美しさを保ちます
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      # 6. 静的解析（Lintチェック）
      #    プロジェクトの analysis_options.yaml に基づき、潜在的な不具合や規約違反を検知します
      - name: Analyze project
        run: |
          # flutter analyze 実行時に custom_lint プラグインがサーバーエラーを起こすのを防ぐため、
          # 一時的に analysis_options.yaml からプラグイン設定をコメントアウトします。
          sed -i 's/plugins:/# plugins:/g' analysis_options.yaml
          sed -i 's/- custom_lint/# - custom_lint/g' analysis_options.yaml
          flutter analyze
          # custom_lint は専用のコマンドで実行します（CI環境での公式推奨手順）
          dart run custom_lint

      # 7. 全テストの実行とカバレッジデータの生成
      #    カバレッジ100%のテスト群がすべてパスすることを確認します
      - name: Run tests with coverage
        run: flutter test --coverage

      # 7.5. lcovのインストール（カバレッジレポート生成ツール genhtml に必要）
      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      # 7.8. カバレッジデータから自動生成ファイルや設定ファイルを除外
      - name: Remove excluded files from coverage
        run: |
          lcov --ignore-errors unused --remove coverage/lcov.info \
          '**/firebase_options_*.dart' \
          'lib/l10n/*' \
          '**/*.g.dart' \
          '**/*.freezed.dart' \
          -o coverage/lcov.info

      # 7.9. カバレッジパスの修正（どんな環境でも強制的に lib/ からの相対パスにする最強の魔法）
      - name: Fix coverage paths
        run: sed -i 's|SF:.*/lib/|SF:lib/|g' coverage/lcov.info

      # 8. カバレッジ結果の可視化
      #    GitHub Actionsの実行結果画面に、どのファイルがテストされたかの表を表示します
      - name: Report coverage
        uses: zgosalvez/github-actions-report-lcov@v4
        with:
          coverage-files: ./coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          minimum-coverage: 80
          update-comment: true
