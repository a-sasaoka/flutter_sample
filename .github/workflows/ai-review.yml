name: Gemini AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  # コメントでAIを呼び出せるようにするための設定 (手動テストに便利です)
  issue_comment:
    types: [created]

# PRにコメントを書き込み、ファイルを適切に読み書きするための権限を追加
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    # ボットのコメントには反応しないようにし、かつ下書きPRを除外します
    if: ${{ github.event.sender.type != 'Bot' && github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    env:
      SYSTEM_MESSAGE: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ① 外部の Markdown ファイルを読み込んで一時的な環境変数に格納する
      - name: Read review prompt
        run: |
          echo "SYSTEM_MESSAGE<<EOF" >> $GITHUB_ENV
          cat prompts/review-rules.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ② 最新の公式リポジトリ the-pr-agent/pr-agent を使用 (ダブルアンダースコア __ を使用した正しい環境変数指定)
      - name: Run PR Agent
        uses: the-pr-agent/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GeminiのAPIキーを設定 (LiteLLMが直接認識する標準名)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 使用するモデルを指定 (最新の3.5-flash)
          CONFIG__MODEL: "gemini/gemini-3.5-flash"
          # 自動レビュー機能をオンにします
          GITHUB_ACTION_CONFIG__AUTO_REVIEW: "true"
          # prompts/review-rules.md の中身をカスタム指示として渡します
          PR_REVIEW__EXTRA_INSTRUCTIONS: ${{ env.SYSTEM_MESSAGE }}
