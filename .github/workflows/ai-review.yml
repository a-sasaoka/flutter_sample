name: Gemini AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

# PRにコメントを書き込み、ファイルを適切に読み書きするための権限を追加
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      SYSTEM_MESSAGE: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ① 外部の Markdown ファイルを読み込んで一時的な環境変数に格納する
      - name: Read review prompt
        run: |
          echo "SYSTEM_MESSAGE<<EOF" >> $GITHUB_ENV
          cat prompts/review-rules.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ② PR-Agent を実行するステップ (ダブルアンダースコア __ を使用した正しい環境変数指定)
      - name: Run PR Agent
        uses: Codium-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GeminiのAPIキーを設定 (ツールが認識できる複数の環境変数に対応させています)
          GOOGLE_AI_STUDIO__GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 使用するモデルを指定 (gemini/プレフィックスが必要です)
          CONFIG__MODEL: "gemini/gemini-3.5-flash"
          # 自動レビュー機能をオンにします
          GITHUB_ACTION_CONFIG__AUTO_REVIEW: "true"
          # prompts/review-rules.md の中身をカスタム指示として渡します
          PR_REVIEW__EXTRA_INSTRUCTIONS: ${{ env.SYSTEM_MESSAGE }}
