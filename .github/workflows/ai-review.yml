name: Gemini AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

# PRにレビューコメントを書き込むための権限を追加
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      SYSTEM_MESSAGE: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ① 外部の Markdown ファイルを読み込んで一時的な環境変数に格納する
      - name: Read review prompt
        run: |
          echo "SYSTEM_MESSAGE<<EOF" >> $GITHUB_ENV
          cat prompts/review-rules.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ② PR-Agent を実行するステップ
      - name: Run PR Agent
        uses: Codium-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GeminiのAPIキーを設定
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 使用するモデルを指定 (gemini/プレフィックスが必要です)
          config.model: "gemini/gemini-3.5-flash"
          # 自動レビュー機能をオンにします
          github_action_config.auto_review: "true"
          # prompts/review-rules.md の中身をカスタム指示として渡します
          pr_review.extra_instructions: ${{ env.SYSTEM_MESSAGE }}
