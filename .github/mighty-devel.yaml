# -----------------------------
# 1. PRの要約（サマリー）に対する指示
# -----------------------------
pr_description:
  instruction: |
    必ず以下のルールに従ってPRの説明を生成してください。
    - 説明、要約、変更点のリストなど、すべてのテキストは「日本語」で出力してください。
    - プログラムの変数名などはそのまま英語で構いませんが、解説文は日本語に徹してください。
    - 英語での出力は一切禁止します。
    - Respond strictly in Japanese.

# -----------------------------
# 2. コードレビューに対する指示
# -----------------------------
code_review:
  instruction: |
    必ず以下のルールと観点に従ってコードレビューを行ってください。

    【基本ルール】
    - レビューコメントや解説は、すべて「日本語」で出力してください。
    - 英語での出力は一切禁止します。
    - Respond strictly in Japanese.
    - 修正案のコードを提示する場合は、具体的な理由も添えてください。

    【レビューの観点】
    1. アーキテクチャと基本ルール
    - Feature-Driven Architecture: 適切なフォルダ構成（features/機能名/...）になっているか？
    - ロギング: print() や logger パッケージが残っていないか？（すべて talker_flutter を使用しているか）
    - インポート: Riverpodのインポートは hooks_riverpod に統一されているか？
    - Linter: very_good_analysis のルールに抵触しそうな、保守性の低い書き方はないか？
    - 保守性の観点: 将来的に機能が増えた時に困る部分はないか？
    - 最新のトレンド: Dart 3の最新機能（RecordsやPattern Matchingなど）を使って、もっとスマートに書ける部分はあるか？
    - パフォーマンス: 無駄なリビルドが発生している箇所はないか？

    2. Riverpod 状態管理
    - Notifierの使い分け: 状態更新が必要な場合に @riverpod アノテーション付きの Notifier クラスを使っているか？（単なるデータ取得層は関数プロバイダになっているか）
    - 購読方法: ウィジェットの build メソッド内で ref.read を使わず、必ず ref.watch を使用しているか？
    - イミュータブルな更新: コレクション（List等）を更新する際、破壊的な変更（.add等）を避け、state = [...state] のように新しいインスタンスを代入しているか？

    3. データ構造とロジック
    - Freezed: データモデルに Freezed を適切に使用し、sealed クラスなどで型安全な条件分岐ができているか？
    - 非同期処理: Future や Stream のエラーハンドリングが漏れていないか？

    4. テストコード（テストがある場合）
    - モック: mocktail を使い、Firebaseや外部通信が適切にモック化されているか？
    - AutoDispose対策: テスト内で container.listen を使い、プロバイダの予期せぬ破棄を防いでいるか？
    - 非同期エラーテスト: エラー系のテストで .future を待機してデッドロック（タイムアウト）を起こす書き方をしていないか？

    5. 初心者向けの解説
    - 解説のステップ: 指摘箇所について、①現状の問題点、②なぜそれが良くないのか、③修正案、の3ステップで分かりやすく説明して。
