# ===============================================
# Flutter Sample Project
# Flutter 3.35.7（FVM管理）用設定
# ===============================================

name: flutter_sample
description: "Flutter学習・実践用のサンプルプロジェクト"
publish_to: "none" # 公開しない（GitHub管理用）

version: 1.0.0+1

# -----------------------------------------------
# 💡 環境設定
# -----------------------------------------------
environment:
  sdk: ^3.9.2

# -----------------------------------------------
# 📦 依存パッケージ
# Flutter本体や、実行時に必要なライブラリを定義
# -----------------------------------------------
dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # --- 標準UIアイコン ---
  cupertino_icons: ^1.0.8

  # --- 🌱 状態管理（Riverpod + Hooks構成）---
  flutter_riverpod: ^3.0.3
  hooks_riverpod: ^3.0.3
  flutter_hooks: ^0.21.3+1
  riverpod_annotation: ^4.0.0

  # --- 🚀 ルーティング（画面遷移）---
  go_router: ^17.0.0

  # --- 🌐 HTTP通信 ---
  dio: ^5.9.0

  # --- 🎨 テーマ管理 ---
  flex_color_scheme: ^8.3.1

  # --- 🧾 環境変数管理 ---
  envied: ^1.3.1

  # --- 🪵 ログ出力 ---
  talker_flutter: ^5.1.16
  talker_riverpod_logger: ^5.1.16
  talker_dio_logger: ^5.1.16

  # --- 💾 ローカルデータ保存 ---
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.0.0
  drift: ^2.29.0
  sqlite3_flutter_libs: ^0.6.0+eol

  # --- 🧱 JSONシリアライズ・デシリアライズ ---
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # --- 📱 アプリ情報取得 ---
  package_info_plus: ^9.0.0
  version: ^3.0.2

  # --- 🌍 多言語対応 ---
  intl: ^0.20.2

  # --- 🔐 Firebase ---
  firebase_core: ^4.2.1
  firebase_crashlytics: ^5.0.5
  firebase_analytics: ^12.0.4
  firebase_auth: ^6.1.2
  google_sign_in: ^7.2.0
  firebase_remote_config: ^6.1.4
  firebase_ai: ^3.9.0
  firebase_app_check: ^0.4.1+5

  # --- Util ---
  flutter_markdown_plus: ^1.0.7
  uuid: ^4.5.3
  connectivity_plus: ^7.1.1
  ansicolor: ^2.0.3
  path_provider: ^2.1.5
  path: ^1.9.1
  fl_chart: ^1.2.0

# -----------------------------------------------
# 🛠️ 開発時に使用する依存関係（コード生成・Lintなど）
# -----------------------------------------------
dev_dependencies:
  flutter_test:
    sdk: flutter

  # --- 🔍 Lint設定（コード品質チェック） ---
  flutter_lints: ^6.0.0
  very_good_analysis: ^10.0.0
  custom_lint: ^0.8.0
  riverpod_lint: ^3.0.3

  # --- 🧱 コード生成関連 ---
  build_runner: ^2.15.0 # 各種ジェネレーターを動かす
  freezed: ^3.2.3 # イミュータブルクラス生成
  json_serializable: ^6.11.1 # JSONモデル生成
  envied_generator: ^1.3.1 # 環境変数ファイル生成
  riverpod_generator: ^4.0.0+1 # Riverpod用コード生成
  mocktail: ^1.0.4 # モック生成
  drift_dev: ^2.29.0 # drift用コード生成
  go_router_builder: ^4.1.1 # go_router用コード生成
  flutter_flavorizr: ^2.2.3 # Flavorの自動構成ツール
  flutter_launcher_icons: ^0.13.1 # アイコン生成ツール（Flavor対応用）

# -----------------------------------------------
# 🎯 Flutter固有の設定
# -----------------------------------------------
flutter:
  uses-material-design: true
  generate: true

  # --- 画像やフォントを登録する場合は以下を使用 ---
  # assets:
  #   - assets/images/
  #
  # fonts:
  #   - family: NotoSansJP
  #     fonts:
  #       - asset: assets/fonts/NotoSansJP-Regular.otf

flavorizr:
  app:
    name: "Flutter Sample"

  flavors:
    local:
      app:
        name: "[Local] Sample"
      android:
        applicationId: "jp.example.sample.local"
      ios:
        bundleId: "jp.example.sample.local"
    dev:
      app:
        name: "[Dev] Sample"
      android:
        applicationId: "jp.example.sample.dev"
      ios:
        bundleId: "jp.example.sample.dev"
    stg:
      app:
        name: "[Stg] Sample"
      android:
        applicationId: "jp.example.sample.stg"
      ios:
        bundleId: "jp.example.sample.stg"
    prod:
      app:
        name: "Sample App"
      android:
        applicationId: "jp.example.sample"
      ios:
        bundleId: "jp.example.sample"
